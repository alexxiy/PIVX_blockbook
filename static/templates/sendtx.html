{{define "specific" -}}
<div class="glass-card">
    <h3 class="mt-0 mb-4">Send Raw Transaction</h3>
    <form method="POST" action="/sendtx" class="mb-0">
        <div class="form-group">
            <label for="exampleFormControlTextarea1" class="text-muted">Raw transaction data (hex)</label>
            <textarea class="form-control" rows="8" name="hex" id="exampleFormControlTextarea1" placeholder="Enter hex raw transaction here...">{{.SendTxHex}}</textarea>
        </div>
        <div class="form-group mb-0"><button type="submit" class="btn btn-primary">Send Transaction</button></div>
    </form>
</div>
{{- if .Status -}}
<div class="alert alert-success" style="border-radius: 8px;">{{.Status}}</div>
{{- end -}}
{{- if .Error -}}
<div class="alert alert-danger" style="border-radius: 8px;">{{.Error.Text}}</div>
{{- end -}}
{{- end -}}
